<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8"/>
		<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
		<title>CJQ - Profile</title>
		<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet"/>
		<link rel="stylesheet" href="styles.css"/>
	</head>
	<body>
		<button id="view-toggle" onclick="toggleView()">
			<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
				<path d="M6 9l6-6 6 6"/>
				<path d="M6 15l6 6 6-6"/>
			</svg>
			<span id="toggle-label">Print View</span>
		</button>
		<div id="loading">Loading<span class="loading-dot">.</span>
			<span class="loading-dot">.</span>
			<span class="loading-dot">.</span>
		</div>
		<header id="header" style="display:none">
			<div class="name-block">
				<h1 id="full-name"></h1>
				<p class="role" id="tagline"/>
			</div>
			<div class="contact-block" id="contact-block"/>
		</header>
		<main>
			<aside id="sidebar" style="display:none">
				<div class="skills-section" id="skills-section"></div>
				<div class="education-section" id="education-section"></div>
			</aside>
			<section class="content" id="experience-section" style="display:none"/>
		</main>
		<script src="main.js"></script>
		<script>
			fetch('data/profile.json')
				.then(r => r.json())
				.then(data => setTimeout(() => render(data), 600))
				.catch(() => {
					document.getElementById('loading').textContent = 'Failed to load profile.json';
				}
			);
		</script>
	</body>
</html>
